services:
  neo4j:
    image: neo4j:5.26
    container_name: flights-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt driver
    environment:
      # Username / password used everywhere in this project
      NEO4J_AUTH: neo4j/flights123
      # Enable the APOC plugin (used for richer queries + CSV export)
      NEO4J_PLUGINS: '["apoc"]'
      # Allow LOAD CSV from the mounted import directory
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_dbms_security_allow__csv__import__from__file__urls: "true"
      # A little extra memory for the route import / path queries
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - ./data:/var/lib/neo4j/import        # CSV/.dat files visible as file:///<name>
      - ./import:/import-scripts            # Cypher import scripts
      - neo4j_data:/data                    # Persisted database
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  neodash:
    image: neo4jlabs/neodash:latest
    platform: linux/amd64   # no native arm64 image; runs fine under emulation (static frontend)
    container_name: flights-neodash
    ports:
      - "5005:5005"   # NeoDash UI
    depends_on:
      - neo4j

volumes:
  neo4j_data:
  neo4j_logs:
